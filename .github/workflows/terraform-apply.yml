name: terraform-apply

# Applies the `resources` stack after merge.
# - push to `dev`  -> applies the dev environment
# - push to `main` -> applies the prd environment
# Authenticates to GCP via Workload Identity Federation (keyless).
on:
  push:
    branches: [main, dev]
    paths:
      - "infrastructure/**"

permissions:
  contents: read
  id-token: write # required for WIF

concurrency:
  group: tf-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply (${{ github.ref_name == 'main' && 'prd' || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prd' || 'dev' }}
    defaults:
      run:
        working-directory: infrastructure/projects/resources
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tfvars=env_prd.tfvars" >> "$GITHUB_OUTPUT"
            echo "project=${{ secrets.GCP_PROJECT_PRD }}" >> "$GITHUB_OUTPUT"
          else
            echo "tfvars=env_dev.tfvars" >> "$GITHUB_OUTPUT"
            echo "project=${{ secrets.GCP_PROJECT_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ steps.env.outputs.project }}-terraform-state"

      - name: Terraform apply
        run: terraform apply -auto-approve -var-file=${{ steps.env.outputs.tfvars }}
