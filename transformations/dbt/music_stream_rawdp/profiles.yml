music_stream_rawdp:
  target: dev
  outputs:
    dev:
      dataset: music_stream_rawdp
      job_execution_timeout_seconds: 300
      job_retries: 1
      location: "{{ env_var('GCP_REGION', 'europe-west1') }}"
      method: oauth
      priority: interactive
      project: "{{ env_var('GCP_PROJECT_DEV', 'REPLACE-ME-music-stream-dev') }}"
      threads: 3
      type: bigquery
    prd:
      dataset: music_stream_rawdp
      job_execution_timeout_seconds: 300
      job_retries: 1
      location: "{{ env_var('GCP_REGION', 'europe-west1') }}"
      method: oauth
      priority: interactive
      project: "{{ env_var('GCP_PROJECT_PRD', 'REPLACE-ME-music-stream-prd') }}"
      threads: 3
      type: bigquery
